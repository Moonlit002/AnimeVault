<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | AnimeVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
        #notification {
            transform: translateY(100px);
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        #notification.show {
            transform: translateY(0);
        }
        .custom-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .custom-modal.show {
            display: flex;
        }
        .modal-content {
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .custom-modal.show .modal-content {
            transform: scale(1);
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <!-- Notification Toast -->
    <div id="notification" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] bg-white border border-slate-100 px-6 py-4 rounded-[24px] shadow-2xl flex items-center space-x-4 pointer-events-none min-w-[320px]">
        <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <div>
            <p id="notification-text" class="font-bold text-slate-900 text-sm">Action successful</p>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Profile Update</p>
        </div>
    </div>

    <!-- Custom Confirmation Modal -->
    <div id="confirm-modal" class="custom-modal">
        <div class="modal-content bg-white w-full max-w-sm rounded-[32px] shadow-2xl p-8 text-center">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h3 id="confirm-title" class="text-2xl font-extrabold text-slate-900 mb-2">Confirm Action</h3>
            <p id="confirm-message" class="text-slate-500 font-medium mb-8 leading-relaxed">Are you sure you want to proceed with this action?</p>
            <div class="flex gap-3">
                <button id="confirm-cancel" class="flex-1 py-4 bg-slate-50 text-slate-500 rounded-2xl font-bold hover:bg-slate-100 transition-all">Cancel</button>
                <button id="confirm-ok" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="glass-nav fixed w-full z-50 top-0">
        <div class="container mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">A</div>
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">Anime<span class="text-blue-600">Vault</span></h1>
            </div>
            <div class="flex items-center space-x-6">
                <a href="index.html" class="flex items-center space-x-2 text-slate-600 hover:text-blue-600 font-bold transition-all group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    <span>Return</span>
                </a>
                <button onclick="logout()" class="text-slate-500 hover:text-red-500 font-bold transition-colors">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 pt-32 pb-24">
        <div class="max-w-4xl mx-auto">
            <!-- Profile Header -->
            <div class="bg-white rounded-[40px] p-8 md:p-12 border border-slate-100 shadow-sm mb-12 flex flex-col md:flex-row items-center gap-8">
                <div class="relative group">
                    <div id="profile-avatar" class="w-32 h-32 bg-blue-100 rounded-full flex items-center justify-center text-4xl font-extrabold text-blue-600 overflow-hidden border-4 border-white shadow-lg">
                        <!-- Initial or Image -->
                    </div>
                    <label class="absolute bottom-0 right-0 w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center cursor-pointer hover:bg-blue-700 transition-colors shadow-lg border-2 border-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="handleAvatarUpload(event)">
                    </label>
                </div>
                <div class="text-center md:text-left flex-1">
                    <h2 id="profile-name" class="text-4xl font-extrabold text-slate-900 mb-2">Loading...</h2>
                    <p id="profile-email" class="text-slate-500 font-medium mb-1">loading...</p>
                    <p id="profile-id" class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-6">ID: loading...</p>
                    <div class="flex flex-wrap justify-center md:justify-start gap-4">
                        <div class="bg-slate-50 px-4 py-2 rounded-xl border border-slate-100">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-1">Total Orders</span>
                            <span id="stat-orders" class="text-xl font-extrabold text-slate-900">0</span>
                        </div>
                        <div class="bg-slate-50 px-4 py-2 rounded-xl border border-slate-100">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-1">Total Spent</span>
                            <span id="stat-spent" class="text-xl font-extrabold text-blue-600">$0.00</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Order History -->
            <div class="space-y-8">
                <div class="flex justify-between items-end">
                    <h3 class="text-2xl font-extrabold text-slate-900">Order History</h3>
                    <p class="text-slate-500 font-medium">Tracking your latest purchases</p>
                </div>
                
                <div id="orders-list" class="space-y-4">
                    <!-- Orders will be injected here -->
                    <div class="text-center py-20 bg-white rounded-[32px] border border-slate-100">
                        <p class="text-slate-400 font-medium">No orders found yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const DB_KEYS = {
            PRODUCTS: 'animevault_products',
            ORDERS: 'animevault_orders',
            USERS: 'animevault_users',
            LOGGED_IN_USER: 'animevault_current_user'
        };

        let currentUser = JSON.parse(localStorage.getItem(DB_KEYS.LOGGED_IN_USER));

        if (!currentUser) {
            window.location.href = 'index.html';
        }

        // Fetch latest user data from Supabase to ensure cross-device sync
        async function fetchLatestUserData() {
            try {
                const response = await fetch(`/api/users/${currentUser.id}?t=${Date.now()}`);
                if (response.ok) {
                    const latestUser = await response.json();
                    if (latestUser) {
                        // Preserve the password from local storage if not returned by API
                        const updatedUser = { ...currentUser, ...latestUser };
                        currentUser = updatedUser;
                        localStorage.setItem(DB_KEYS.LOGGED_IN_USER, JSON.stringify(currentUser));
                        renderProfile();
                    }
                }
            } catch (e) {
                console.error('Failed to fetch latest user data:', e);
            }
        }

        function getDB(key, defaultVal = []) {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : defaultVal;
        }

        function setDB(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        // UI Management
        function showNotification(text) {
            const el = document.getElementById('notification');
            document.getElementById('notification-text').innerText = text;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        function showConfirm(title, message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirm-modal');
                const titleEl = document.getElementById('confirm-title');
                const messageEl = document.getElementById('confirm-message');
                const okBtn = document.getElementById('confirm-ok');
                const cancelBtn = document.getElementById('confirm-cancel');

                titleEl.innerText = title;
                messageEl.innerText = message;
                modal.classList.add('show');

                const cleanup = (value) => {
                    modal.classList.remove('show');
                    okBtn.removeEventListener('click', onOk);
                    cancelBtn.removeEventListener('click', onCancel);
                    resolve(value);
                };

                const onOk = () => cleanup(true);
                const onCancel = () => cleanup(false);

                okBtn.addEventListener('click', onOk);
                cancelBtn.addEventListener('click', onCancel);
            });
        }

        function renderProfile() {
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('profile-name').innerText = currentUser.name;
            document.getElementById('profile-email').innerText = currentUser.email;
            document.getElementById('profile-id').innerText = `ID: ${currentUser.id}`;
            
            const avatarEl = document.getElementById('profile-avatar');
            if (currentUser.avatar) {
                avatarEl.innerHTML = `<img src="${currentUser.avatar}" class="w-full h-full object-cover">`;
            } else {
                avatarEl.innerText = currentUser.name.charAt(0).toUpperCase();
            }

            const orders = getDB(DB_KEYS.ORDERS).filter(o => 
                o.userId === currentUser.id || 
                o.customer === currentUser.id || 
                o.customer === currentUser.name
            );
            const totalSpent = orders.reduce((sum, o) => sum + Number(o.amount), 0);

            document.getElementById('stat-orders').innerText = orders.length;
            document.getElementById('stat-spent').innerText = `$${totalSpent.toFixed(2)}`;

            const ordersList = document.getElementById('orders-list');
            ordersList.innerHTML = '';

            if (orders.length === 0) {
                ordersList.innerHTML = '<div class="text-center py-12 text-slate-400 font-medium">You haven\'t placed any orders yet.</div>';
            } else {
                orders.forEach(order => {
                    const orderEl = document.createElement('div');
                    orderEl.className = "bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm flex flex-col md:flex-row justify-between items-center gap-6 hover:shadow-md transition-shadow";
                    
                    const canConfirmDelivery = order.status === 'Shipped';
                    const isDelivered = order.status === 'Delivered';
                    
                    orderEl.innerHTML = `
                        <div class="flex items-center gap-6 w-full md:w-auto">
                            <div class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 overflow-hidden">
                                ${order.image ? `<img src="${order.image}" class="w-full h-full object-cover">` : `
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                                </svg>
                                `}
                            </div>
                            <div>
                                <h4 class="font-extrabold text-slate-900">${order.id}</h4>
                                <p class="text-slate-500 text-sm font-medium line-clamp-1">${order.product}</p>
                            </div>
                        </div>
                        <div class="flex items-center justify-between w-full md:w-auto md:gap-12">
                            <div class="text-right">
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Amount</p>
                                <p class="font-extrabold text-slate-900">$${Number(order.amount).toFixed(2)}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Status</p>
                                <span class="px-3 py-1 ${isDelivered ? 'bg-green-50 text-green-600' : 'bg-blue-50 text-blue-600'} rounded-full text-[10px] font-bold uppercase tracking-wider">${order.status}</span>
                            </div>
                            ${canConfirmDelivery ? `
                            <div class="text-right">
                                <button onclick="confirmDelivery('${order.id}')" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">
                                    Confirm Arrival
                                </button>
                            </div>
                            ` : ''}
                            <div class="text-right hidden sm:block">
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Date</p>
                                <p class="text-slate-500 text-sm font-medium">${order.date}</p>
                            </div>
                        </div>
                    `;
                    ordersList.appendChild(orderEl);
                });
            }
        }

        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const avatarData = e.target.result;
                    currentUser.avatar = avatarData;
                    
                    // Save to Supabase first
                    try {
                        await fetch(`/api/users/${currentUser.id}/avatar`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ avatar: avatarData })
                        });
                    } catch (e) {
                        console.error('Failed to save avatar to Supabase:', e);
                    }
                    
                    // Update in Users DB locally
                    const users = getDB(DB_KEYS.USERS);
                    const userIndex = users.findIndex(u => u.id === currentUser.id);
                    if (userIndex !== -1) {
                        users[userIndex].avatar = avatarData;
                        setDB(DB_KEYS.USERS, users);
                    }
                    
                    // Update Logged in user
                    localStorage.setItem(DB_KEYS.LOGGED_IN_USER, JSON.stringify(currentUser));
                    renderProfile();
                    showNotification("Profile picture updated!");
                };
                reader.readAsDataURL(file);
            }
        }

        async function confirmDelivery(orderId) {
            const confirmed = await showConfirm('Confirm Delivery', 'Have you received this item? Confirming will mark it as Delivered.');
            if (confirmed) {
                // Optimistic update
                const orders = getDB(DB_KEYS.ORDERS);
                const orderIndex = orders.findIndex(o => o.id === orderId || o.order_id === orderId);
                if (orderIndex !== -1) {
                    orders[orderIndex].status = 'Delivered';
                    setDB(DB_KEYS.ORDERS, orders);
                    renderProfile();
                }

                try {
                    const response = await fetch(`/api/orders/${orderId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: 'Delivered' })
                    });
                    
                    if (!response.ok) throw new Error('Failed to update server');
                    
                    // Refresh from server
                    const supabaseOrders = await loadOrdersFromSupabase();
                    if (supabaseOrders && supabaseOrders.length > 0) {
                        setDB(DB_KEYS.ORDERS, supabaseOrders);
                        renderProfile();
                    }
                    showNotification('Order marked as Delivered. Thank you!');
                } catch (e) {
                    console.error('Failed to update order in Supabase:', e);
                    showNotification('Status updated locally, but failed to sync with server.', 'warning');
                }
            }
        }

        async function loadOrdersFromSupabase() {
            try {
                const url = `/api/orders?userId=${encodeURIComponent(currentUser.id)}&userName=${encodeURIComponent(currentUser.name)}&t=${Date.now()}`;
                const response = await fetch(url);
                if (response.ok) {
                    const supabaseOrders = await response.json();
                    if (!Array.isArray(supabaseOrders)) return [];
                    
                    const localOrders = getDB(DB_KEYS.ORDERS);
                    
                    return supabaseOrders.map(order => {
                        // Try to find the image from local orders if it exists
                        const localMatch = localOrders.find(lo => (lo.id === order.order_id || lo.order_id === order.order_id));
                        
                        return {
                            id: order.order_id || order.id,
                            order_id: order.order_id || order.id,
                            userId: (order.customer === currentUser.id || order.customer === currentUser.name) ? currentUser.id : order.customer,
                            customer: order.customer,
                            product: order.product,
                            amount: order.amount,
                            status: order.status,
                            date: order.date ? new Date(order.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'Unknown',
                            timestamp: order.date ? new Date(order.date).getTime() : 0,
                            image: order.image || (localMatch ? localMatch.image : null)
                        };
                    });
                }
            } catch (e) {
                console.error('Failed to load orders from Supabase:', e);
            }
            return [];
        }

        function logout() {
            localStorage.removeItem(DB_KEYS.LOGGED_IN_USER);
            window.location.href = 'index.html';
        }

        async function initializeProfile() {
            // Render local data immediately for better UX
            renderProfile();
            
            // Fetch latest user data (including avatar) from Supabase
            await fetchLatestUserData();
            
            // Try to load orders from Supabase in the background
            const supabaseOrders = await loadOrdersFromSupabase();
            
            // Merge with local orders (if any)
            const localOrders = getDB(DB_KEYS.ORDERS);
            const allOrders = [...supabaseOrders, ...localOrders];
            
            // Filter orders for current user and remove duplicates
            const uniqueOrders = [];
            const seenIds = new Set();
            allOrders.forEach(order => {
                const orderId = order.id || order.order_id;
                if (!seenIds.has(orderId) && (order.userId === currentUser.id || order.customer === currentUser.id || order.customer === currentUser.name)) {
                    seenIds.add(orderId);
                    uniqueOrders.push(order);
                }
            });
            
            // Sort by date (newest first)
            uniqueOrders.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            
            // Update local DB with merged orders
            setDB(DB_KEYS.ORDERS, uniqueOrders);
            renderProfile();
        }

        initializeProfile();
    </script>
</body>
</html>
